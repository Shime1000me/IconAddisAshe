<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IconAddis - Student Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #F5F5F5;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            border: 2px solid #2C3E50;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .header {
            background-color: #2C3E50;
            color: white;
            padding: 20px 30px;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 3px solid #008080;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            background-color: #34495E;
            padding: 5px 15px;
            border-radius: 30px;
            transition: background 0.2s;
        }

        .header a:hover {
            background-color: #008080;
        }

        .main {
            padding: 40px 30px;
            background-color: white;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        .welcome-text h2 {
            color: #2C3E50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .welcome-text p {
            color: #666;
            font-size: 16px;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 600;
            color: #2C3E50;
            font-size: 16px;
        }

        .input-field {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
        }

        .input-field:focus {
            outline: none;
            border-color: #008080;
            box-shadow: 0 0 0 3px rgba(0,128,128,0.1);
        }

        .remember-row {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }

        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-login {
            background-color: #008080;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #006666;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,128,128,0.3);
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background-color: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background-color: white;
            padding: 0 15px;
            color: #666;
            font-size: 14px;
        }

        .register-link {
            text-align: center;
        }

        .btn-register {
            background-color: #3498DB;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-register:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52,152,219,0.3);
        }

        .forgot-password {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .forgot-password a {
            color: #008080;
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .footer {
            background-color: #2C3E50;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            border-top: 3px solid #008080;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #c62828;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #2e7d32;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- header -->
    <div class="header">
        <span>🔐 STUDENT LOGIN</span>
        <a href="../index.html">Home</a>
    </div>

    <!-- main content -->
    <div class="main">
        <div class="welcome-text">
            <h2>Welcome back!</h2>
            <p>Login to continue practicing</p>
        </div>

        <!-- messages -->
        <div id="errorMessage" class="error-message">
            ❌ Invalid name or password. Please try again.
        </div>
        <div id="successMessage" class="success-message">
            ✅ Login successful! Redirecting...
        </div>

        <!-- login form -->
        <form id="loginForm" class="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" class="input-field" placeholder="Enter your full name" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" class="input-field" placeholder="Enter your password" required>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember"> 
                <label for="remember">Remember me</label>
            </div>

            <button type="submit" class="btn-login">🔓 LOGIN & PRACTICE</button>
        </form>

        <div class="divider">
            <span>New here?</span>
        </div>

        <div class="register-link">
            <button onclick="window.location.href='register.html'" class="btn-register">✨ CREATE NEW ACCOUNT</button>
        </div>

        <div class="forgot-password">
            Forgot password? <a href="#" onclick="alert('Please contact your teacher to reset your password')">Contact your teacher</a>
        </div>
    </div>

    <!-- footer -->
    <div class="footer">
        © 2024 IconAddis Practice Hub
    </div>
</div>

<script>
    // Simple login simulation (for demo purposes)
    function handleLogin(event) {
        event.preventDefault();
        
        const name = document.getElementById('fullName').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        
        // Demo credentials (in real app, this would check against Google Sheets)
        // For demo: any name with password "password123" works
        // Also specific demo accounts
        
        const demoAccounts = [
            { name: "Sarah J.", password: "sarah123" },
            { name: "Mike C.", password: "mike456" },
            { name: "Emma W.", password: "emma789" },
            { name: "David K.", password: "david000" }
        ];
        
        // Check if it's a demo account
        const matchedAccount = demoAccounts.find(acc => acc.name === name && acc.password === password);
        
        // Also allow any name with password "password123" for testing
        if (matchedAccount || (name && password === "password123")) {
            // Success
            errorDiv.style.display = 'none';
            successDiv.style.display = 'block';
            
            // Store login state
            localStorage.setItem('studentName', name);
            localStorage.setItem('isLoggedIn', 'true');
            
            // Redirect to dashboard after 1 second
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } else {
            // Error
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
        }
    }
    
    // Check if already logged in
    if (localStorage.getItem('isLoggedIn') === 'true') {
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
